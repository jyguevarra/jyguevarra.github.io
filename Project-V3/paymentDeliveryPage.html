<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment and Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
    <nav class="nav">
      <div class="logo">Rhine<span class="labs">Labs</span></div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="productCatalog.html">Product Catalog</a>
        <a href="shoppingCart.html">Shopping Cart</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>



  <section class="alt-hero" role="region" aria-label="Hero">
    <div class="hero-inner">
      <!-- Something will be placed here in the future -->
    </div>
  </section>

  <main class="receipt-section">
    
    <br>

    <div class="hero-inner">
      <h1 class="hero-title">Payment & Delivery</h1>
      <p class="hero-sub">Choose your payment method and delivery option</p>
    </div>

    <section class="container">
      <form action="transactionConfirmation.html" method="get">
        
        <div class="payment-section">
          <h2>Select Payment Method</h2>

          <div class="payment-options">
            
            <label>
              <input type="radio" name="payment" value="cod" checked>
              Cash on Delivery
            </label>

            <label>
              <input type="radio" name="payment" value="card">
              Credit/Debit Card
            </label>

            <label>
              <input type="radio" name="payment" value="gcash">
              GCash
            </label>

            <label>
              <input type="radio" name="payment" value="paypal">
              PayPal
            </label>
          </div>
        </div>

        <div class="delivery-section">
          <h2>Select Delivery Option</h2>

          <div class="delivery-options">
            <label>
              <input type="radio" name="delivery" value="standard" checked>
              Standard Delivery (3-5 days) - ₱50
            </label>

            <label>
              <input type="radio" name="delivery" value="express">
              Express Delivery (1-2 days) - ₱100
            </label>

            <label>
              <input type="radio" name="delivery" value="pickup">
              Store Pickup (Free)
            </label>
          </div>
        </div>

        <br><br>

        <div class="form-actions">
          <button type="submit" class="btn-sm">Proceed to Confirmation</button>
          <a href="shoppingCart.html" class="btn btn">Back to Cart</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Rhine Labs · All rights reserved</p>
    </div>
  </footer>
</body>
</html>
